name: Facebook Ads Automation

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install packages
      run: |
        pip install pandas requests gspread google-auth

    - name: Run script
      run: python ads_control.py
